name: Deploy static site to S3

on:
  push:
    branches: [ "main" ]

permissions:
  id-token: write   # required for OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      # If you're using Vite/Vue/React, your output is usually dist/ (or build/)
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::975050092888:role/GitHubActionsS3Deploy
          aws-region: us-east-2

      - name: Sync to S3
        run: |
          aws s3 sync ./dist s3://time-tracker-frontend-jiaqizhao2004/ --delete

      # Optional: CloudFront cache invalidation
      - name: Invalidate CloudFront
        run: aws cloudfront create-invalidation --distribution-id E3L17E74FPN9PG --paths "/*"
